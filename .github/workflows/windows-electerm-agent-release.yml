name: Windows Electerm Agent Release

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta
      confirm_stable_release:
        description: "输入 ShellPilot stable release 确认创建稳定版发布草稿"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer and portable package
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/electerm-agent

    env:
      CI: true
      WORKFLOW_NAME: windows-electerm-agent
      AIGSHELL_UPDATE_CHANNEL: ${{ github.event.inputs.release_channel }}
      npm_config_msvs_version: "2026"
      npm_config_build_from_source: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify manual stable release confirmation
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.release_channel }}" -eq "stable" -and "${{ github.event.inputs.confirm_stable_release }}" -ne "ShellPilot stable release") {
            throw "发布确认失败：请在手动触发 workflow 时输入 ShellPilot stable release"
          }

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/electerm-agent/package-lock.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Install Yarn Classic for Electerm packaging
        run: npm install -g yarn@1.22.22

      - name: Install dependencies and rebuild native modules
        run: npm ci

      - name: Read package version
        id: package-version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Start Windows OpenSSH agent service
        run: |
          Set-Service ssh-agent -StartupType Manual
          Start-Service ssh-agent

      - name: Run unit tests
        run: npm run test-unit-ci

      - name: Build renderer and prepare packaged app
        run: npm run b

      - name: Prepare electron-builder config
        run: npm run pb

      - name: Build NSIS installer
        run: |
          node -e "const c = require('./build/bin/build-common'); c.patchNsisKeepShortcuts(); c.writeSrc('win-x64-installer.exe')"
          npx electron-builder --win nsis --publish never

      - name: Smoke test packaged ShellPilot app
        run: npm run test-package-smoke
        env:
          AIGSHELL_PACKAGE_SMOKE_TIMEOUT: "30000"

      - name: Build portable package
        run: |
          node build/bin/prepare-win-portable-ci.js
          npx electron-builder --win zip --publish never

      - name: Verify portable package
        run: npm run verify-win-portable

      - name: Prepare approved online update assets
        run: npm run release:prepare-assets

      - name: Verify local update assets
        run: npm run release:local:verify

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ssh-agent-tool-windows-${{ github.ref_name }}
          path: |
            apps/electerm-agent/dist/ShellPilot-*-win-x64-installer.exe
            apps/electerm-agent/dist/ShellPilot-*-win-x64-installer.exe.blockmap
            apps/electerm-agent/dist/ShellPilot-*-win-x64-portable.zip
            apps/electerm-agent/dist/latest.yml
            apps/electerm-agent/dist/aigshell-update.json
          if-no-files-found: error
          retention-days: 14

      - name: Create draft GitHub Release after manual confirmation
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ steps.package-version.outputs.tag }}
          name: ShellPilot ${{ steps.package-version.outputs.tag }}
          files: |
            apps/electerm-agent/dist/ShellPilot-*-win-x64-installer.exe
            apps/electerm-agent/dist/ShellPilot-*-win-x64-installer.exe.blockmap
            apps/electerm-agent/dist/ShellPilot-*-win-x64-portable.zip
            apps/electerm-agent/dist/latest.yml
            apps/electerm-agent/dist/aigshell-update.json
