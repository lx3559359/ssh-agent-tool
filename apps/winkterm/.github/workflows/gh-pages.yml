name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - ".github/workflows/gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website
          branch: gh-pages
          clean: true
