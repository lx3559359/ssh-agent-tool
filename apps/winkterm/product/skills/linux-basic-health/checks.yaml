version: 1
name: linux-basic-health
mode: readonly
checks:
  - id: uptime
    command: uptime
    reason: 查看系统运行时长和负载情况
    risk: safe
    timeout_seconds: 10
  - id: disk
    command: df -hT
    reason: 查看磁盘空间压力和文件系统类型
    risk: safe
    timeout_seconds: 10
  - id: memory
    command: free -h
    reason: 查看内存和交换分区压力
    risk: safe
    timeout_seconds: 10
  - id: top_cpu
    command: ps -eo pid,user,pcpu,pmem,stat,comm --sort=-pcpu | head -n 16
    reason: 查看 CPU 占用最高的进程且不暴露完整启动参数
    risk: safe
    timeout_seconds: 10
  - id: journal_errors
    command: journalctl -p err -n 80 --no-pager
    reason: 查看最近的系统错误日志
    risk: safe
    timeout_seconds: 10
  - id: failed_services
    command: systemctl --failed --no-pager
    reason: 查看失败的 systemd 服务单元
    risk: safe
    timeout_seconds: 10
  - id: listening_ports
    command: ss -tulpn | head -n 80
    reason: 查看受限数量的 TCP 和 UDP 监听服务
    risk: safe
    timeout_seconds: 10
